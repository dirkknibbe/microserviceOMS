global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'e-commerce-microservices'
    replica: 'prometheus-01'

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'alertmanager:9093'

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics
    scrape_interval: 15s

  # Order Service
  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:3000']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: '/metrics'

  # Inventory Service  
  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service:8080']
    metrics_path: /actuator/prometheus
    scrape_interval: 30s
    scrape_timeout: 10s

  # Payment Service
  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:3000']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # Notification Service
  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:8080']
    metrics_path: /actuator/prometheus
    scrape_interval: 30s
    scrape_timeout: 10s

  # User Service
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3000']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # GraphQL Gateway
  - job_name: 'graphql-gateway'
    static_configs:
      - targets: ['graphql-gateway:4000']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # Infrastructure Services
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
    metrics_path: /metrics
    scrape_interval: 60s

  - job_name: 'postgres-orders'
    static_configs:
      - targets: ['postgres-orders:5432']
    metrics_path: /metrics
    scrape_interval: 60s

  - job_name: 'postgres-inventory'
    static_configs:
      - targets: ['postgres-inventory:5432']
    metrics_path: /metrics
    scrape_interval: 60s

  - job_name: 'postgres-users'
    static_configs:
      - targets: ['postgres-users:5432']
    metrics_path: /metrics
    scrape_interval: 60s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: /metrics
    scrape_interval: 60s

  # Node Exporter for system metrics (if added)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: /metrics
    scrape_interval: 60s

  # cAdvisor for container metrics (if added)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: /metrics
    scrape_interval: 60s