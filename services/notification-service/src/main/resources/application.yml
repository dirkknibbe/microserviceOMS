server:
  port: 8080

spring:
  application:
    name: notification-service
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:development}
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.microservice.oms.notification.event"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.microservice.oms.notification: ${LOG_LEVEL:INFO}
    org.springframework.kafka: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

app:
  kafka:
    topics:
      order-events: order.events
      payment-events: payment.events
      user-events: user.events
      notification-events: notification.events
  
  email:
    provider: sendgrid
    sendgrid:
      api-key: ${SENDGRID_API_KEY:}
      from-email: noreply@microservice-oms.com
      from-name: E-Commerce OMS
  
  sms:
    provider: twilio
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-number: ${TWILIO_FROM_NUMBER:+1234567890}

---
spring:
  config:
    activate:
      on-profile: development

logging:
  level:
    com.microservice.oms.notification: DEBUG

---
spring:
  config:
    activate:
      on-profile: production

logging:
  level:
    com.microservice.oms.notification: INFO
    root: WARN